<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graduate Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(#dd0a85, #000000);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      color: white;
      cursor: none;
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    .particle-gold {
      background: radial-gradient(circle at 30% 30%, #ffd700, #996515);
      box-shadow: 0 0 6px #ffd700;
    }

    .particle-black {
      background: radial-gradient(circle at 30% 30%, #333, #000);
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
    }

    .header {
      text-align: center;
      padding: 1em 0;
      z-index: 2;
    }

    .neon-text {
      font-size: 4rem;
      color: #fff;
      text-shadow: 0 0 5px #ff005e, 0 0 10px #ff005e, 0 0 20px #ff005e, 0 0 40px #ff005e, 0 0 80px #ff005e;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      0% {
        text-shadow: 0 0 5px #ff005e, 0 0 10px #ff005e, 0 0 20px #ff005e, 0 0 40px #ff005e, 0 0 80px #ff005e;
      }
      100% {
        text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff, 0 0 80px #00d4ff, 0 0 160px #00d4ff;
      }
    }

    .instruction {
      font-size: 1.2em;
      color: #f0f0f0;
      text-shadow: 1px 1px #000;
      margin: 1em 0;
    }

    .progress-container {
      width: 60%;
      height: 10px;
      background: #444;
      margin: 1em auto;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #fff;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: limegreen;
      transition: width 0.3s ease;
    }

    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('images/red-heart-shape-icon.png');
      background-size: cover;
      pointer-events: none;
      z-index: 3;
    }

    .next-level {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4em;
      color: #00ff00;
      opacity: 0;
      text-align: center;
      z-index: 1000;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      transition: opacity 0.3s ease;
    }

    .cursor-circle {
      position: fixed;
      width: 30px;
      height: 30px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 10000;
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="neon-text">💖 Capture the hearts! 💖</div>
    <div class="instruction">You must capture 10 hearts to move to the next page</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <div class="next-level" id="next-level-msg">Congrats! Moving to the next level in 3 seconds...</div>
  <div class="cursor-circle" id="cursor"></div>

  <script>
    let heartsCaptured = 0;
    const totalHearts = 10;
    const progressBar = document.getElementById("progress-bar");
    const heartContainer = document.body;
    const cursor = document.getElementById("cursor");

    // Add particle system
    function createParticle(isGold) {
      const particle = document.createElement('div');
      particle.className = `particle ${isGold ? 'particle-gold' : 'particle-black'}`;
      const size = Math.random() * (isGold ? 4 : 3) + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * window.innerWidth + 'px';
      particle.style.top = Math.random() * window.innerHeight + 'px';
      
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 1 + 0.5;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      
      document.body.appendChild(particle);
      
      function updateParticle() {
        const currentLeft = parseFloat(particle.style.left);
        const currentTop = parseFloat(particle.style.top);
        
        particle.style.left = (currentLeft + vx) + 'px';
        particle.style.top = (currentTop + vy) + 'px';
        
        if (currentLeft < -size || currentLeft > window.innerWidth + size ||
            currentTop < -size || currentTop > window.innerHeight + size) {
          particle.remove();
        } else {
          requestAnimationFrame(updateParticle);
        }
      }
      
      requestAnimationFrame(updateParticle);
    }

    // Spawn particles periodically
    setInterval(() => {
      createParticle(Math.random() < 0.3); // 30% chance of gold particles
    }, 200);

    function spawnHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * (window.innerWidth - 50) + 'px';
      heart.style.top = '-60px';

      heartContainer.appendChild(heart);

      let y = -60;
      let x = parseFloat(heart.style.left);
      const fallSpeed = Math.random() * 4 + 6; // Increased speed range: 6-10 pixels per frame
      const wobbleSpeed = Math.random() * 1.5 - 0.75; // Reduced wobble speed for smoother movement
      const wobbleAmount = Math.random() * 15 + 10; // Reduced wobble amount for smoother movement
      const startTime = Date.now();

      const fallInterval = setInterval(() => {
        y += fallSpeed;
        const time = (Date.now() - startTime) / 1000;
        const wobble = Math.sin(time * wobbleSpeed) * wobbleAmount;
        
        heart.style.top = y + 'px';
        heart.style.left = (x + wobble) + 'px';
        heart.style.transform = `rotate(${Math.sin(time * wobbleSpeed) * 15}deg)`; // Added smooth rotation

        if (y > window.innerHeight) {
          heart.remove();
          clearInterval(fallInterval);
        } else {
          const heartRect = heart.getBoundingClientRect();
          const cursorRect = cursor.getBoundingClientRect();

          if (
            cursorRect.left < heartRect.right &&
            cursorRect.right > heartRect.left &&
            cursorRect.top < heartRect.bottom &&
            cursorRect.bottom > heartRect.top
          ) {
            heart.remove();
            clearInterval(fallInterval);
            heartsCaptured++;
            updateProgress();
            checkLevel();
          }
        }
      }, 16.67); // Changed to 16.67ms (60 FPS) for smoother animation
    }

    function updateProgress() {
      const percent = (heartsCaptured / totalHearts) * 100;
      progressBar.style.width = percent + '%';
    }

    function checkLevel() {
      if (heartsCaptured >= totalHearts) {
        const nextMsg = document.getElementById('next-level-msg');
        nextMsg.style.opacity = 1;
        let countdown = 3;
        
        function updateCountdown() {
          nextMsg.textContent = countdown;
          if (countdown === 0) {
            window.location.href = "levelcomplete.html";
          } else {
            countdown--;
            setTimeout(updateCountdown, 1000);
          }
        }
        
        updateCountdown();
      }
    }

    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });

    document.addEventListener('click', () => {
      cursor.style.transform = 'translate(-50%, -50%) scale(0.9)';
      setTimeout(() => {
        cursor.style.transform = 'translate(-50%, -50%) scale(1)';
      }, 100);
    });

    // Start spawning hearts immediately when the page loads
    setInterval(spawnHeart, 500); // Changed from 1000ms to 500ms
  </script>
</body>
</html>
