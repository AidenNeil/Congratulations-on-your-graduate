<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Celebration</title>
    <style>
        /* General reset for margin and padding */
        body, h1, p {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body setup with gradient background */
        body {
            background: linear-gradient(to bottom, #ff7e5f, #feb47b);
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            position: relative;
            height: 100vh;
        }

        /* Main container to center content */
        .container {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        /* Heading styles */
        h1 {
            font-size: 8vw; /* Responsive font size */
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            animation: glow 1.5s ease-in-out infinite;
        }

        /* Keyframe for glowing text */
        @keyframes glow {
            0% {
                text-shadow: 0 0 10px #ff7e5f, 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b;
            }
            50% {
                text-shadow: 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b, 0 0 50px #feb47b;
            }
            100% {
                text-shadow: 0 0 10px #ff7e5f, 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b;
            }
        }

        /* Paragraph styles */
        p {
            font-size: 5vw; /* Scalable text for mobile */
            margin-top: 10px;
        }

        /* Flower animation and placement */
        .flower {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            animation: float 5s ease-in-out infinite;
        }

        /* Floating flower animation */
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        /* Responsive font size for smaller screens */
        @media (max-width: 768px) {
            h1 {
                font-size: 10vw; /* Larger heading on smaller screens */
            }

            p {
                font-size: 6vw; /* Larger text for better readability */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Graduation Celebration</h1>
        <p>Congratulations to all our graduates!</p>
    </div>

    <div class="flower">
        <img src="flower.png" alt="Flower Animation" width="100">
    </div>

</body>
</html>
