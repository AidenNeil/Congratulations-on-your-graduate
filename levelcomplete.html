<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Complete!</title>
    <link rel="stylesheet" href="css/flower.css">
    <style>
        /* General styles for all screen sizes */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: Arial, sans-serif;
        }

        .message {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
            color: #fff;
        }

        .congratulations {
            font-size: 3em;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00;
            margin-bottom: 20px;
            white-space: nowrap;
        }

        .congratulations span {
            display: inline-block;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 0.5s forwards;
        }

        @keyframes fadeInDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .return-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #00ff00, #00aa00);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .return-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.7);
        }

        /* Flower styles */
        .flowers {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .flower {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 20px;
        }

        /* Responsive design for phones and laptops */
        @media (max-width: 768px) {
            .congratulations {
                font-size: 2em;
            }

            .return-button {
                font-size: 1em;
                padding: 10px 20px;
            }

            .flowers {
                flex-direction: column;
                align-items: center;
            }

            .flower {
                width: 80px;
                height: 80px;
                margin: 10px;
            }
        }

        @media (max-width: 480px) {
            .congratulations {
                font-size: 1.5em;
            }

            .return-button {
                font-size: 0.9em;
                padding: 8px 15px;
            }

            .flowers {
                flex-direction: column;
                align-items: center;
            }

            .flower {
                width: 60px;
                height: 60px;
                margin: 5px;
            }
        }
    </style>
</head>

<body class="not-loaded">
  <div class="message">
    <div class="congratulations">
      <span style="animation-delay: 0.1s">Congrats</span>
      <span style="animation-delay: 0.3s">On</span>
      <span style="animation-delay: 0.5s">Your</span>
      <span style="animation-delay: 0.7s">Graduate!</span>
      <span style="animation-delay: 0.9s">Proud</span>
      <span style="animation-delay: 1.1s">Of You🫶</span>
    </div>
  </div>

  <div class="night"></div>
  <div class="flowers">
    <!-- Flower elements go here (same as in your original code) -->
  </div>

  <a href="#" class="return-button">Return</a>

</body>
</html>
