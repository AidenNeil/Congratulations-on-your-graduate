<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduation Celebration</title>
    <style>
        /* General reset for margin and padding */
        body, h1, p {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Make the body background gradient */
        body {
            background: linear-gradient(to bottom, #ff7e5f, #feb47b);
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            position: relative;
            height: 100vh;
        }

        /* Main container for content */
        .container {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Heading styles for the celebratory message */
        h1 {
            font-size: 8vw; /* Use viewport width for scaling */
            color: #fff;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        /* Animation for the glowing effect */
        @keyframes glow {
            0% {
                text-shadow: 0 0 10px #ff7e5f, 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b;
            }
            50% {
                text-shadow: 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b, 0 0 50px #feb47b;
            }
            100% {
                text-shadow: 0 0 10px #ff7e5f, 0 0 20px #ff7e5f, 0 0 30px #ff7e5f, 0 0 40px #feb47b;
            }
        }

        /* Apply glow effect to heading */
        h1 {
            animation: glow 1.5s ease-in-out infinite;
        }

        /* Responsive font size for smaller screens */
        @media (max-width: 768px) {
            h1 {
                font-size: 10vw; /* Slightly larger for smaller screens */
            }
        }

        /* Smaller text for the subheading */
        p {
            font-size: 4vw; /* Use viewport width for scalability */
            margin-top: 10px;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            p {
                font-size: 5vw; /* Larger text for readability on small screens */
            }
        }

        /* Add some margin between the container and the bottom */
        .container p {
            margin-top: 20px;
        }

        /* Flower animation and other design elements */
        /* Example of flower CSS */
        .flower {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Graduation Celebration</h1>
        <p>Congratulations to all our graduates!</p>
    </div>

    <!-- Example of the flower element -->
    <div class="flower">
        <img src="flower.png" alt="Flower Animation" width="100">
    </div>

    <!-- Insert the remaining flower animation HTML from original file here -->

</body>
</html>
