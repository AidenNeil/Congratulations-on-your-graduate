<!--  
 
  CSS Blossoming Flowers at Magical Night.
  I've taken some inspiration by Yup Nguyen's Artwork: https://dribbble.com/shots/11096994-Virtual-Garden.
  Made with Pure CSS & ♥

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Complete!</title>
    <link rel="stylesheet" href="css/flower.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .message {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1000;
        }

        .congratulations {
            font-size: 3em;
            color: #fff;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00, 0 0 30px #00ff00;
            margin-bottom: 20px;
            white-space: nowrap;
        }

        .congratulations span {
            display: inline-block;
            opacity: 0;
            transform: translateY(-20px);
            animation: fadeInDown 0.5s forwards;
        }

        @keyframes fadeInDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .return-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 30px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #00ff00, #00aa00);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .return-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.7);
        }
    </style>
</head>
<body class="not-loaded">
    <div class="message">
        <div class="congratulations">
            <span style="animation-delay: 0.1s">Congrats</span>
            <span style="animation-delay: 0.3s">On</span>
            <span style="animation-delay: 0.5s">Your</span>
            <span style="animation-delay: 0.7s">Graduate!</span>
            <span style="animation-delay: 0.9s">Proud</span>
            <span style="animation-delay: 1.1s">Of You🫶</span>
        </div>
    </div>

    <!-- Blossoming Flowers Animation -->
    <!-- Insert the remaining flower animation HTML from original file here -->

    <a class="return-button" href="../index.html">Return Home</a>

    <!-- Flower animation CSS should be in css/flower.css or added below -->
</body>
</html>
